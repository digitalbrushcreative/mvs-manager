<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in · Mountain View School</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/base.css">
<style>
  body { background: var(--navy-darker); font-family: var(--sans); margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; padding: 24px; }
  .login-card { width: 100%; max-width: 420px; background: var(--white); border-radius: var(--r-lg); padding: 40px; box-shadow: var(--shadow-modal); }
  .crest { width: 56px; height: 56px; margin: 0 auto 18px; display:block; }
  .login-card h1 { font-family: var(--display); font-weight: 700; font-size: 24px; margin: 0 0 6px; text-align: center; color: var(--navy-darker); }
  .login-card .sub { text-align: center; color: var(--grey-500); font-size: 14px; margin-bottom: 28px; }
  .login-field { margin-bottom: 16px; }
  .login-field label { display:block; font-size:12px; text-transform:uppercase; letter-spacing:0.06em; font-weight:600; color:var(--grey-500); margin-bottom:6px; }
  .login-field input { width:100%; padding:12px 14px; border:1px solid var(--grey-200); border-radius:var(--r-md); font-size:15px; font-family:var(--sans); box-sizing:border-box; }
  .login-field input:focus { outline: none; border-color: var(--navy); }
  .login-btn { width:100%; padding:14px; background:var(--crimson); color:var(--white); border:none; border-radius:var(--r-md); font-family:var(--sans); font-weight:600; font-size:15px; cursor:pointer; margin-top: 8px; }
  .login-btn:hover { background: var(--crimson-deep); }
  .login-btn:disabled { opacity: 0.6; cursor: wait; }
  .error { padding: 10px 12px; background: var(--crimson-soft); color: var(--crimson-deep); border-radius: var(--r-md); font-size: 13px; margin-bottom: 14px; }
  .demo-hint { margin-top: 24px; padding: 14px; background: var(--grey-50); border: 1px solid var(--grey-100); border-radius: var(--r-md); font-size: 12px; color: var(--grey-500); line-height: 1.6; }
  .demo-hint strong { color: var(--navy-darker); }
  .demo-hint code { font-family: var(--mono); background: var(--white); padding: 1px 5px; border-radius: 3px; }
  .public-link { display: block; text-align: center; margin-top: 18px; color: var(--grey-500); font-size: 13px; text-decoration: none; }
  .public-link:hover { color: var(--navy); }
</style>
</head>
<body>
<div class="login-card">
  <svg class="crest" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
    <circle cx="20" cy="20" r="18" fill="none" stroke="#2c3f6b" stroke-width="1"/>
    <circle cx="20" cy="20" r="16" fill="none" stroke="#2c3f6b" stroke-width="0.4"/>
    <path d="M 7 24 L 13 14 L 17 19 L 22 10 L 28 18 L 33 24 Z" fill="#2c3f6b"/>
    <path d="M 7 24 L 33 24 L 33 26 L 7 26 Z" fill="#2c3f6b"/>
    <circle cx="26" cy="13" r="2" fill="#d4a84b"/>
  </svg>
  <h1>Mountain View School</h1>
  <p class="sub">Field Trips — staff & parent portal</p>

  <div id="errBox" class="error" hidden></div>

  <form id="loginForm">
    <div class="login-field">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" autocomplete="username" required>
    </div>
    <div class="login-field">
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
    </div>
    <button id="submitBtn" class="login-btn" type="submit">Sign in</button>
  </form>

  <div class="demo-hint">
    <strong>Demo accounts:</strong><br>
    Admin · <code>admin@mvs.test</code> / <code>admin123</code><br>
    Parent · <code>parent@example.com</code> / <code>parent123</code>
  </div>

  <a class="public-link" href="parent/">Browse upcoming trips (no login needed) →</a>
</div>

<script>
(function () {
  const API = 'http://localhost:3001/api';
  const form = document.getElementById('loginForm');
  const errBox = document.getElementById('errBox');
  const submitBtn = document.getElementById('submitBtn');

  // Already logged in? Route straight through.
  const existing = JSON.parse(localStorage.getItem('mvs-session') || 'null');
  if (existing?.token && existing?.user?.role) redirect(existing.user.role);

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errBox.hidden = true;
    submitBtn.disabled = true;
    try {
      const res = await fetch(API + '/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value.trim(),
          password: document.getElementById('password').value
        })
      });
      const payload = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(payload.error || 'Sign in failed');
      localStorage.setItem('mvs-session', JSON.stringify(payload));
      redirect(payload.user.role);
    } catch (err) {
      errBox.textContent = err.message;
      errBox.hidden = false;
      submitBtn.disabled = false;
    }
  });

  function redirect(role) {
    if (role === 'admin') location.replace('index.html');
    else location.replace('parent/dashboard.html');
  }
})();
</script>
</body>
</html>
