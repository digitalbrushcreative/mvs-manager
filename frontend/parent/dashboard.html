<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Trips · Mountain View School</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/tokens.css">
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="parent.css">
<style>
  .dash-header { display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom: 24px; }
  .user-box { display:flex; align-items:center; gap:12px; }
  .user-box .avatar { width:40px; height:40px; border-radius:50%; background:var(--navy); color:var(--white); display:flex; align-items:center; justify-content:center; font-weight:700; }
  .user-box .name { font-weight:600; color:var(--navy-darker); }
  .user-box .email { font-size:12px; color:var(--grey-500); }
  .logout-btn { background:transparent; border:1px solid var(--grey-200); padding:8px 14px; border-radius:var(--r-md); cursor:pointer; font-family:var(--sans); font-size:13px; color:var(--grey-700); }
  .logout-btn:hover { border-color:var(--crimson); color:var(--crimson); }

  .section-title { font-family:var(--display); font-weight:700; font-size:18px; color:var(--navy-darker); margin:32px 0 14px; text-transform:uppercase; letter-spacing:0.05em; }
  .pupil-card { background:var(--white); border:1px solid var(--grey-100); border-radius:var(--r-lg); padding:22px 24px; margin-bottom:14px; }
  .pupil-card-head { display:flex; justify-content:space-between; align-items:flex-start; gap:16px; margin-bottom:14px; flex-wrap:wrap; }
  .pupil-card-head h3 { font-family:var(--display); font-weight:700; font-size:20px; margin:0; color:var(--navy-darker); }
  .pupil-card-head .trip { font-size:13px; color:var(--grey-500); }
  .status-pill { display:inline-block; padding:3px 10px; border-radius:var(--r-sm); font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; }
  .status-paid { background:var(--success-soft); color:var(--success); }
  .status-deposit { background:var(--info-soft); color:var(--info); }
  .status-pending { background:var(--warning-soft); color:var(--warning); }
  .status-overdue { background:var(--crimson-soft); color:var(--crimson-deep); }

  .payment-bar { height:8px; background:var(--grey-100); border-radius:4px; overflow:hidden; margin-top:6px; }
  .payment-bar-fill { height:100%; background:var(--success); transition: width 200ms; }
  .payment-meta { display:flex; justify-content:space-between; font-size:12px; color:var(--grey-500); margin-top:6px; }

  .doc-list { list-style:none; padding:0; margin:12px 0 0; display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:8px; }
  .doc-item { display:flex; align-items:center; gap:10px; padding:10px 12px; background:var(--grey-50); border-radius:var(--r-md); font-size:13px; }
  .doc-item.verified { background:var(--success-soft); color:var(--success); }
  .doc-item.missing { background:var(--crimson-soft); color:var(--crimson-deep); }
  .doc-item.submitted { background:var(--info-soft); color:var(--info); }
  .doc-icon { width:28px; height:28px; border-radius:50%; background:var(--white); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:11px; flex-shrink:0; }
  .doc-name { flex:1; font-weight:500; }
  .doc-status { font-size:11px; text-transform:uppercase; letter-spacing:0.06em; }

  .interest-row { background:var(--white); border:1px solid var(--grey-100); border-radius:var(--r-md); padding:14px 18px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; gap:16px; flex-wrap:wrap; }
  .interest-row .ttl { font-weight:600; color:var(--navy-darker); }
  .interest-row .sub { font-size:12px; color:var(--grey-500); }
  .interest-row .badge { padding:4px 10px; border-radius:var(--r-sm); font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; }
  .badge-new { background:var(--grey-100); color:var(--grey-700); }
  .badge-contacted { background:var(--info-soft); color:var(--info); }
  .badge-awaiting { background:var(--warning-soft); color:var(--warning); }
  .badge-submitted { background:var(--info-soft); color:var(--info); }
  .badge-converted { background:var(--success-soft); color:var(--success); }
  .badge-declined { background:var(--crimson-soft); color:var(--crimson-deep); }

  .empty { padding:32px; text-align:center; color:var(--grey-400); background:var(--white); border:1px dashed var(--grey-200); border-radius:var(--r-lg); }
</style>
</head>
<body>

<header class="parent-header">
  <div class="parent-header-inner">
    <div class="parent-brand">
      <div class="crest">
        <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
          <circle cx="20" cy="20" r="18" fill="none" stroke="#2c3f6b" stroke-width="1"/>
          <circle cx="20" cy="20" r="16" fill="none" stroke="#2c3f6b" stroke-width="0.4"/>
          <path d="M 7 24 L 13 14 L 17 19 L 22 10 L 28 18 L 33 24 Z" fill="#2c3f6b"/>
          <path d="M 7 24 L 33 24 L 33 26 L 7 26 Z" fill="#2c3f6b"/>
          <circle cx="26" cy="13" r="2" fill="#d4a84b"/>
        </svg>
      </div>
      <div class="parent-brand-text">
        <span class="line1">Mountain View School</span>
        <span class="line2">My Trips</span>
      </div>
    </div>
    <a class="parent-admin-link" href="./">Browse upcoming trips →</a>
  </div>
</header>

<main class="parent-main">
  <div class="dash-header">
    <div class="user-box">
      <div class="avatar" id="avatar">—</div>
      <div>
        <div class="name" id="userName">Loading…</div>
        <div class="email" id="userEmail"></div>
      </div>
    </div>
    <button id="logoutBtn" class="logout-btn">Sign out</button>
  </div>

  <h2 class="section-title">My children</h2>
  <div id="pupilsRoot">
    <div class="empty">Loading…</div>
  </div>

  <h2 class="section-title">Trip interest &amp; seat status</h2>
  <div id="interestsRoot">
    <div class="empty">Loading…</div>
  </div>
</main>

<div id="toastRoot"></div>

<script src="../js/utils/dom.js"></script>
<script src="../js/utils/format.js"></script>
<script src="../js/utils/toast.js"></script>
<script src="../js/utils/api.js"></script>
<script src="../js/utils/storage.js"></script>
<script src="dashboard.js"></script>
</body>
</html>
